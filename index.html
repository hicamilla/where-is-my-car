<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where's My Car?</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <header>
      <div id="header-icon">🚗</div>
      <h1>Where's My Car?</h1>
      <p id="header-sub">Select a spot type then tap Park here</p>
    </header>

    <div id="map"></div>

    <div id="bottom-panel">
      <div id="status-card">
        <div id="status-dot"></div>
        <div>
          <p id="status-message">No spot saved yet</p>
          <p id="status-sub">Choose a type and tap Park here</p>
        </div>
      </div>

      <div id="place-bubbles">
        <p id="bubbles-label">Where are you parking?</p>
        <div id="bubbles-wrap">
          <button class="bubble" data-value="Mall">🛍️ Mall</button>
          <button class="bubble" data-value="Supermarket">🛒 Supermarket</button>
          <button class="bubble" data-value="Street parking">🚗 Street</button>
          <button class="bubble" data-value="Parking lot">🅿️ Parking lot</button>
          <button class="bubble" data-value="Airport">✈️ Airport</button>
          <button class="bubble" data-value="Other">📍 Other</button>
        </div>
      </div>

      <section id="actions">
        <button id="btn-checkin">Park here</button>
        <button id="btn-navigate" class="hidden" disabled>Take me to my car</button>
        <button id="btn-checkout" class="hidden" disabled>Leave this spot</button>
      </section>
    </div>

    <div id="toast" class="hidden">Please choose a spot type first</div>
  </main>

  <script src="app.js"></script>
</body>

</html>
